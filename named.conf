options {
    directory "/var/named";
    listen-on port 53 { any; };
    listen-on-v6 { none; };
    allow-query { any; };
    recursion no;
    dnssec-validation no;
    pid-file "/run/named/named.pid";
};

zone "example.com" IN {
    type master;
    file "example.com.zone";
    allow-update { none; };
};